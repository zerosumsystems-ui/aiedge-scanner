# =============================================================
# Best Stocks of the Day Report — Pipeline 6
# =============================================================
# Run: python pipeline.py --config configs/best_stocks.yaml
# Schedule: 4:30 PM ET, Mon-Fri via launchd (after market close)
# =============================================================

pipeline_name: best_stocks
display_name: "Best Stocks of the Day"

# --- Schedule ---
schedule:
  cron: "30 16 * * 1-5"     # 4:30 PM ET, Mon-Fri (after market close)
  timezone: "America/New_York"

# --- Screener ---
screener:
  type: "best_stocks"
  databento:
    allow_stale_minutes: 60
  databento_queries:
    - dataset: "EQUS.MINI"
      type: "top_gainers"
      min_gain_pct: 2.0
      min_volume: 1000000
      require_bpa_setup: true
  include_economic_calendar: false

# --- Script Writer (Claude) ---
script:
  gemini_model: "gemini-2.5-flash"
  max_tokens_per_run: 10000
  prompt_template: |
    You are writing a best stocks of the day report for active traders. The audience knows
    technical analysis and Brooks price action terminology. Tone: direct, data-driven, no hype.
    Keep total video length to 8-10 minutes. Be specific with numbers.

    These are today's top-performing stocks with clean Brooks price action setups and strong volume:

    NARRATION STYLE — this will be read aloud, so write for the ear, not the eye:
    - Use contractions naturally (it's, doesn't, we've, there's, that's, you're)
    - Write like a trader talking to a colleague, not reading a report
    - Use em dashes (—) for natural pauses; vary sentence length, mix short punchy with longer flowing ones
    - Avoid robotic transitions like "Let us now turn to" or "Moving on to" or "Additionally"
    - Write numbers as spoken ("fifty-two eighty", "up twelve percent", "around a buck thirty")
    - Use natural transitions where they fit: "Now,", "Look,", "Here's the thing —", "And here's what's interesting —"
    - Hook and outro: one or two punchy sentences max, no lists
    - Use ElevenLabs audio tags for pacing: [pause] between key statements, [slows down] before critical price levels, [deliberate] for important numbers

    {screener_data}

    For each stock, identify the specific BPA setup type (H1, H2, L1, L2, spike-and-channel,
    failed breakout, etc.), the exact entry trigger, stop placement relative to the setup, and
    target. Distinguish between stocks worth watching for follow-through tomorrow (strong trend,
    clean pullback structure, volume confirmation) versus likely one-day wonders (gap-and-go
    exhaustion, extended without a base, low float pump).

    Return ONLY valid JSON matching this schema (no markdown fences, no preamble, no trailing text):
    {{
      "title": "string, max 60 chars, includes today's date MM/DD format",
      "hook": "string, 10-15 second opener, what today's top movers have in common in one sentence",
      "segments": [
        {{
          "topic": "string — ticker + setup type, e.g. 'NVDA — H2 Pullback'",
          "narration": "string — 60-90 seconds of natural spoken text per segment",
          "chart_spec": {{
            "ticker": "string",
            "timeframe": "5min|60min|daily",
            "lookback": "int — number of bars",
            "annotations": {{
              "entry": "float or null",
              "stop": "float or null",
              "target": "float or null",
              "key_levels": ["float array"],
              "setup_label": "string or null — BPA setup label, e.g. 'H2 Buy'"
            }},
            "overlays": ["20ema", "vwap"]
          }},
          "on_screen_text": "string — ticker + gain % + setup label, max 40 chars",
          "duration_seconds": "int"
        }}
      ],
      "outro": "string — 10-15 second close, which of today's winners have the best setup for follow-through tomorrow"
    }}

# --- ElevenLabs Narration ---
elevenlabs:
  voice_id: "MFZUKuGQUsGJPQjTS4wC"
  model: "eleven_v3"
  stability: 0.5
  similarity_boost: 0.75
  style: 0.3
  use_speaker_boost: true

# --- Veo B-roll (Google Vertex AI) ---
veo:
  enabled: true
  skip_entirely: false
  use_fallback_on_failure: true
  model: "veo-3.1-fast-generate-001"
  intro_prompt: "Cinematic shot of stock market closing bell, multiple monitors showing top gainers in green, traders celebrating, professional atmosphere, shallow depth of field, 16:9"
  outro_prompt: "Wide shot of financial district at golden hour, confident upward perspective, cinematic quality, 16:9"
  duration_seconds: 6
  aspect_ratio: "16:9"

# --- Video Assembly (ffmpeg) ---
assembly:
  resolution: "1920x1080"
  fps: 30
  ken_burns:
    enabled: true
    zoom_factor: 1.15
    direction: "auto"
  captions:
    enabled: true
    font: "Helvetica Bold"
    size: 48
    position: "bottom"
    color: "#ffffff"
    bg_color: "#000000aa"
  branding:
    color_primary: "#00ff88"
    color_secondary: "#ffffff"
    background: "#0a0a0a"
    watermark_path: null

# --- YouTube Upload ---
youtube:
  enabled: true
  visibility: "unlisted"
  channel_credentials: "credentials/youtube_token.json"
  title_template: "Best Stocks of the Day — {date} — {top_story}"
  description_template: |
    Best stocks of the day for {date}. Top gainers with clean Brooks price action setups and strong volume.

    Segments:
    {segment_list}

    Generated automatically. Not financial advice.
  tags:
    - best stocks
    - top gainers
    - BPA setups
    - price action
    - trading
    - stock picks

# --- Newsletter (Beehiiv) ---
newsletter:
  enabled: true
  platform: "beehiiv"
  api_key_env: "BEEHIIV_API_KEY"
  publication_id_env: "BEEHIIV_PUBLICATION_ID"
  send_as: "draft"
  subject_template: "{title}"
  preview_template: "{hook}"
  body_template: |
    # {title}

    {hook}

    ---

    {segments_as_markdown}

    ---

    **Watch the full video on YouTube:** {youtube_url}

    **Want real-time alerts and the full screener?** [Upgrade to paid]({paid_tier_url})

    *Generated automatically. Not financial advice.*
  segment_format: |
    ## {topic}

    ![{ticker} chart]({chart_url})

    {narration}

    **Key levels:** {key_levels_text}
  cta_paid_tier: true
  paid_tier_url: "REPLACE_WITH_STRIPE_OR_BEEHIIV_PAID_LINK"

# --- Notifications ---
notifications:
  discord_webhook_url_env: "DISCORD_WEBHOOK_URL"
  notify_on_failure: true
  notify_on_success: false
  daily_digest: true
  daily_digest_time: "18:00"

# --- Budget ---
budget:
  daily_max_usd: 20.0

# --- Cleanup ---
cleanup:
  successful_run_days: 7
  failed_run_days: 30

# --- Logging ---
logging:
  level: "INFO"
  log_to_sqlite: true
  log_to_file: true
